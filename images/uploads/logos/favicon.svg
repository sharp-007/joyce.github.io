  <line x1="22" y1="32" x2="26" y2="42" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="22" x2="42" y2="32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
